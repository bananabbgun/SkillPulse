  - { id: spring, name: Spring Boot, facet: 9, aliases: ["spring boot", springboot, spring] }
  - { id: dotnet, name: .NET, facet: 9, aliases: [".net", "asp.net", dotnet] }
  - { id: php, name: PHP, facet: 9, aliases: [php, laravel] }
